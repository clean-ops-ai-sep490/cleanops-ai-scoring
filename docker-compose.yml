services:
  cleanops-ai-scoring-api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - BASE_OUTPUT_DIR=${BASE_OUTPUT_DIR:-/app/outputs}
      - YOLO_TRAIN_PROJECT_DIR=${YOLO_TRAIN_PROJECT_DIR:-/app/outputs/yolo_training_4_4}
      - VISUALIZE_JPEG_QUALITY=${VISUALIZE_JPEG_QUALITY:-92}
      - VISUALIZE_TEMP_URL_TTL_SEC=${VISUALIZE_TEMP_URL_TTL_SEC:-900}
      - VISUALIZE_TEMP_MAX_ITEMS=${VISUALIZE_TEMP_MAX_ITEMS:-200}
      - APP_PUBLIC_BASE_URL=${APP_PUBLIC_BASE_URL:-http://localhost:8000}
    ports:
      - "8000:8000"
    restart: unless-stopped
