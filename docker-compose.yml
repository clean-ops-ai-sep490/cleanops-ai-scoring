services:
  cleanops-ai-scoring-api:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REQUIREMENTS_FILE: ${SCORING_REQUIREMENTS_FILE:-requirements.inference.txt}
    env_file:
      - .env
    environment:
      - APP_HOST=0.0.0.0
      - APP_PORT=${APP_PORT:-8000}
      - APP_RELOAD=false
      - BASE_OUTPUT_DIR=${BASE_OUTPUT_DIR:-/app/outputs}
      - YOLO_TRAIN_PROJECT_DIR=${YOLO_TRAIN_PROJECT_DIR:-/app/outputs/yolo_training_4_4}
      - MODEL_CACHE_DIR=${MODEL_CACHE_DIR:-/app/model-cache}
      - MODEL_STORAGE_ENABLED=${MODEL_STORAGE_ENABLED:-true}
      - MODEL_STORAGE_CONNECTION_STRING=${MODEL_STORAGE_CONNECTION_STRING:-}
      - MODEL_STORAGE_CONTAINER=${MODEL_STORAGE_CONTAINER:-models}
      - MODEL_STORAGE_ACTIVE_YOLO_KEY=${MODEL_STORAGE_ACTIVE_YOLO_KEY:-scoring/active/yolo/model.pt}
      - MODEL_STORAGE_ACTIVE_UNET_KEY=${MODEL_STORAGE_ACTIVE_UNET_KEY:-scoring/active/unet/model.pth}
      - MODEL_FORCE_REFRESH=${MODEL_FORCE_REFRESH:-false}
      - MODEL_REQUIRE_BLOB=${MODEL_REQUIRE_BLOB:-true}
      - VISUALIZE_JPEG_QUALITY=${VISUALIZE_JPEG_QUALITY:-92}
      - VISUALIZE_TEMP_URL_TTL_SEC=${VISUALIZE_TEMP_URL_TTL_SEC:-900}
      - VISUALIZE_TEMP_MAX_ITEMS=${VISUALIZE_TEMP_MAX_ITEMS:-200}
      - LLM_FILTER_ENABLED=${LLM_FILTER_ENABLED:-false}
      - LLM_FILTER_MODEL=${LLM_FILTER_MODEL:-gemini-2.5-flash}
      - LLM_FILTER_TIMEOUT_SEC=${LLM_FILTER_TIMEOUT_SEC:-12}
      - LLM_FILTER_BATCH_CONCURRENCY=${LLM_FILTER_BATCH_CONCURRENCY:-2}
      - LLM_FILTER_QUEUE_ENABLED=${LLM_FILTER_QUEUE_ENABLED:-true}
      - LLM_FILTER_QUEUE_MODE=${LLM_FILTER_QUEUE_MODE:-global_fifo}
      - LLM_FILTER_DEADLINE_SEC=${LLM_FILTER_DEADLINE_SEC:-60}
      - LLM_FILTER_RETRY_INITIAL_DELAY_MS=${LLM_FILTER_RETRY_INITIAL_DELAY_MS:-1000}
      - LLM_FILTER_RETRY_MAX_DELAY_MS=${LLM_FILTER_RETRY_MAX_DELAY_MS:-8000}
      - LLM_FILTER_RETRYABLE_STATUS_CODES=${LLM_FILTER_RETRYABLE_STATUS_CODES:-429,500,502,503,504}
      - LLM_FILTER_MAX_IMAGE_DIMENSION=${LLM_FILTER_MAX_IMAGE_DIMENSION:-1280}
      - LLM_FILTER_JPEG_QUALITY=${LLM_FILTER_JPEG_QUALITY:-85}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_BASE_URL=${GEMINI_BASE_URL:-https://generativelanguage.googleapis.com/v1beta}
      - APP_PUBLIC_BASE_URL=${APP_PUBLIC_BASE_URL:-http://localhost:8000}
      - RETRAIN_API_ENABLED=${RETRAIN_API_ENABLED:-true}
      - RETRAIN_API_KEY=${RETRAIN_API_KEY:-}
      - RETRAIN_USE_REMOTE_TRAINER=${RETRAIN_USE_REMOTE_TRAINER:-true}
      - RETRAIN_TRAINER_BASE_URL=${RETRAIN_TRAINER_BASE_URL:-}
      - RETRAIN_TRAINER_SUBMIT_PATH=${RETRAIN_TRAINER_SUBMIT_PATH:-/trainer/jobs}
      - RETRAIN_TRAINER_API_KEY=${RETRAIN_TRAINER_API_KEY:-}
      - RETRAIN_TRAINER_TIMEOUT_SEC=${RETRAIN_TRAINER_TIMEOUT_SEC:-7200}
      - RETRAIN_COMMAND=${RETRAIN_COMMAND:-}
      - RETRAIN_COMMAND_TIMEOUT_SEC=${RETRAIN_COMMAND_TIMEOUT_SEC:-7200}
      - RETRAIN_WORKDIR=${RETRAIN_WORKDIR:-/app}
      - RETRAIN_STORAGE_CONNECTION_STRING=${RETRAIN_STORAGE_CONNECTION_STRING:-}
      - RETRAIN_CONTAINER=${RETRAIN_CONTAINER:-retrain}
      - RETRAIN_EXTERNAL_PREFIX=${RETRAIN_EXTERNAL_PREFIX:-scoring/external/latest}
      - RETRAIN_CANDIDATE_YOLO_FILE=${RETRAIN_CANDIDATE_YOLO_FILE:-outputs/retrain/candidate/yolo_best.pt}
      - RETRAIN_CANDIDATE_UNET_FILE=${RETRAIN_CANDIDATE_UNET_FILE:-outputs/retrain/candidate/unet_best.pth}
      - RETRAIN_CANDIDATE_METRICS_FILE=${RETRAIN_CANDIDATE_METRICS_FILE:-outputs/retrain/candidate_metrics.json}
      - RETRAIN_ALLOW_EXISTING_BLOB_CANDIDATE=${RETRAIN_ALLOW_EXISTING_BLOB_CANDIDATE:-true}
    ports:
      - "8000:8000"
    volumes:
      - cleanopsai-scoring-outputs:/app/outputs
      - cleanopsai-model-cache:/app/model-cache
      - ./models:/app/models:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import sys,urllib.request; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:8000/health/ready').getcode() == 200 else 1)",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  cleanops-ai-scoring-trainer:
    profiles: ["trainer"]
    build:
      context: .
      dockerfile: Dockerfile.train
    env_file:
      - .env
    environment:
      - BASE_OUTPUT_DIR=${BASE_OUTPUT_DIR:-/app/outputs}
      - YOLO_TRAIN_PROJECT_DIR=${YOLO_TRAIN_PROJECT_DIR:-/app/outputs/yolo_training_4_4}
      - TRAINER_API_ENABLED=${TRAINER_API_ENABLED:-true}
      - TRAINER_API_KEY=${RETRAIN_TRAINER_API_KEY:-}
      - TRAINER_COMMAND=${SCORING_TRAIN_COMMAND:-python src/train_yolo.py}
      - TRAINER_TIMEOUT_SEC=${TRAINER_TIMEOUT_SEC:-7200}
      - TRAINER_WORKDIR=${TRAINER_WORKDIR:-/app}
    volumes:
      - cleanopsai-scoring-outputs:/app/outputs
      - ./data:/app/data
      - ./models:/app/models
      - ./unet_dataset:/app/unet_dataset
    expose:
      - "8001"
    restart: "no"

volumes:
  cleanopsai-scoring-outputs:
    name: cleanopsai-scoring-outputs
  cleanopsai-model-cache:
    name: cleanopsai-model-cache
